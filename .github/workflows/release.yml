name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
        include:
          - os: ubuntu-24.04
            artifact_name: optical_raytrace-linux
            artifact_bin: build/bin/optical_raytrace
          - os: windows-2022
            artifact_name: optical_raytrace-windows
            artifact_bin: build/bin/optical_raytrace.exe
          - os: macos-14
            artifact_name: optical_raytrace-macos
            artifact_bin: build/bin/optical_raytrace

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_bin }}
          if-no-files-found: error
