name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
        include:
          - os: ubuntu-24.04
            artifact_name: optical_raytrace_ui-linux
            artifact_path: optical_raytrace_cpp/dist/optical_raytrace_ui
          - os: windows-2022
            artifact_name: optical_raytrace_ui-windows
            artifact_path: optical_raytrace_cpp/dist/optical_raytrace_ui.exe
          - os: macos-14
            artifact_name: optical_raytrace_ui-macos
            artifact_path: optical_raytrace_cpp/dist/optical_raytrace_ui

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install flask pyinstaller

      - name: Build (C++ + PyInstaller)
        run: python build_release.py
        working-directory: optical_raytrace_cpp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
